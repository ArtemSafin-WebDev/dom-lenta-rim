<section class="dom-lenta-hero {{hero.sectionClass}}">
  <div class="dom-lenta-container">
    <div class="dom-lenta-hero__inner">
      <div class="dom-lenta-hero__background">
        <picture>
          <source media="(max-width: 576px)" srcset="{{hero.image.mobileSrc}}" />
          <img class="dom-lenta-hero__background-image" src="{{hero.image.desktopSrc}}" alt="{{hero.image.alt}}"
            width="2680" height="1236" loading="eager" fetchpriority="high" decoding="async" />
        </picture>
      </div>

      {{#if hero.logo}}
      <img class="dom-lenta-hero__logo" src="{{hero.logo.src}}" alt="{{hero.logo.alt}}" width="258" height="50"
        loading="eager" fetchpriority="high" decoding="async" />
      {{/if}}

      <div class="dom-lenta-hero__content">
        <h1 class="dom-lenta-hero__title">{{{hero.titleHtml}}}</h1>
        <p class="dom-lenta-hero__description">{{{hero.descriptionHtml}}}</p>
        {{#if hero.note}}
        <p class="dom-lenta-hero__note">{{hero.note}}</p>
        {{/if}}
        <button class="dom-lenta-hero__button" type="button">
          {{hero.buttonText}}
        </button>
      </div>
    </div>
  </div>
</section>
